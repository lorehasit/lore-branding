<svg width="1128" height="191" viewBox="0 0 1128 191" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Lore — institutional memory for engineering teams">
  <title>Lore — LinkedIn banner</title>
  <defs>
    <!-- warm near-black space -->
    <linearGradient id="bg" x1="0" y1="0" x2="1128" y2="191" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0c0b09"/>
      <stop offset="0.55" stop-color="#141210"/>
      <stop offset="1" stop-color="#0a0908"/>
    </linearGradient>
    <!-- amber depth glow -->
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fc9117" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#fc9117" stop-opacity="0"/>
    </radialGradient>
    <!-- the Lore mark: three concentric arcs -->
    <symbol id="mk" viewBox="0 0 48 48">
      <path d="M39.26 33.54 A18 18 0 1 1 39.26 14.46" fill="none" stroke="#fc9117" stroke-width="3" stroke-linecap="round"/>
      <path d="M34.18 30.36 A12 12 0 1 1 34.18 17.64" fill="none" stroke="#fc9117" stroke-width="3" stroke-linecap="round"/>
      <path d="M29.09 27.18 A6 6 0 1 1 29.09 20.82" fill="none" stroke="#fc9117" stroke-width="3" stroke-linecap="round"/>
    </symbol>
  </defs>

  <rect width="1128" height="191" fill="url(#bg)"/>
  <ellipse cx="620" cy="96" rx="520" ry="230" fill="url(#glow)"/>

  <!-- starfield -->
  <g fill="#f6f3ed">
    <circle cx="70" cy="34" r="1" opacity="0.5"/><circle cx="150" cy="120" r="1.3" opacity="0.35"/>
    <circle cx="240" cy="60" r="1" opacity="0.6"/><circle cx="330" cy="150" r="1" opacity="0.3"/>
    <circle cx="410" cy="30" r="1.4" opacity="0.5"/><circle cx="500" cy="160" r="1" opacity="0.35"/>
    <circle cx="705" cy="26" r="1" opacity="0.55"/><circle cx="770" cy="150" r="1.2" opacity="0.4"/>
    <circle cx="860" cy="52" r="1" opacity="0.5"/><circle cx="940" cy="140" r="1.3" opacity="0.35"/>
    <circle cx="1010" cy="40" r="1" opacity="0.55"/><circle cx="1075" cy="110" r="1" opacity="0.4"/>
    <circle cx="1090" cy="60" r="1.4" opacity="0.5"/><circle cx="590" cy="42" r="1" opacity="0.4"/>
    <circle cx="300" cy="95" r="1" opacity="0.3"/><circle cx="1000" cy="165" r="1" opacity="0.3"/>
  </g>

  <!-- floating marks (depth: far = small/dim, near = large/bright) -->
  <use href="#mk" x="52"  y="96"  width="52"  height="52" opacity="0.22" transform="rotate(-12 78 122)"/>
  <use href="#mk" x="170" y="26"  width="34"  height="34" opacity="0.16" transform="rotate(10 187 43)"/>
  <use href="#mk" x="250" y="118" width="72"  height="72" opacity="0.5"  transform="rotate(-8 286 154)"/>
  <use href="#mk" x="360" y="44"  width="40"  height="40" opacity="0.28" transform="rotate(16 380 64)"/>
  <use href="#mk" x="792" y="30"  width="66"  height="66" opacity="0.45" transform="rotate(-14 825 63)"/>
  <use href="#mk" x="900" y="112" width="48"  height="48" opacity="0.3"  transform="rotate(9 924 136)"/>
  <use href="#mk" x="990" y="34"  width="86"  height="86" opacity="0.6"  transform="rotate(-6 1033 77)"/>
  <use href="#mk" x="1078" y="120" width="30" height="30" opacity="0.2"  transform="rotate(14 1093 135)"/>

  <!-- center lockup: mark + wordmark + tagline -->
  <g transform="translate(0 0)">
    <use href="#mk" x="446" y="60" width="62" height="62"/>
    <circle cx="477" cy="91" r="4.9" fill="#f6f3ed"/>
    <text x="524" y="110" font-family="Geist, Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="56" font-weight="600" letter-spacing="-1.2" fill="#f6f3ed">Lore</text>
    <text x="564" y="146" text-anchor="middle" font-family="Geist, Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16.5" font-weight="500" letter-spacing="0.6" fill="#b7ae9f">Institutional memory for engineering teams</text>
  </g>
</svg>

<svg width="300" height="300" viewBox="0 0 300 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Lore">
  <title>Lore — LinkedIn profile mark</title>
  <defs>
    <linearGradient id="dbg" x1="0" y1="0" x2="300" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#141210"/>
      <stop offset="1" stop-color="#0a0908"/>
    </linearGradient>
    <radialGradient id="dglow" cx="0.5" cy="0.5" r="0.55">
      <stop offset="0" stop-color="#fc9117" stop-opacity="0.28"/>
      <stop offset="0.7" stop-color="#fc9117" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#fc9117" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="300" height="300" fill="url(#dbg)"/>
  <rect width="300" height="300" fill="url(#dglow)"/>

  <!-- faint stars -->
  <g fill="#f6f3ed">
    <circle cx="44" cy="52" r="1.3" opacity="0.45"/><circle cx="250" cy="66" r="1.1" opacity="0.4"/>
    <circle cx="60" cy="240" r="1.2" opacity="0.4"/><circle cx="252" cy="238" r="1.4" opacity="0.45"/>
    <circle cx="150" cy="30" r="1" opacity="0.3"/><circle cx="30" cy="150" r="1" opacity="0.3"/>
    <circle cx="272" cy="150" r="1" opacity="0.3"/><circle cx="150" cy="272" r="1" opacity="0.3"/>
  </g>

  <!-- centered mark: three concentric arcs + cream core -->
  <g transform="translate(75 75) scale(3.125)">
    <path d="M39.26 33.54 A18 18 0 1 1 39.26 14.46" fill="none" stroke="#fc9117" stroke-width="3" stroke-linecap="round"/>
    <path d="M34.18 30.36 A12 12 0 1 1 34.18 17.64" fill="none" stroke="#fc9117" stroke-width="3" stroke-linecap="round"/>
    <path d="M29.09 27.18 A6 6 0 1 1 29.09 20.82" fill="none" stroke="#fc9117" stroke-width="3" stroke-linecap="round"/>
    <circle cx="24" cy="24" r="3" fill="#f6f3ed"/>
  </g>
</svg>
